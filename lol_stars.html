<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红包局 Pro - 数据中心 v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .nav-active { border-bottom: 3px solid #60a5fa; color: #60a5fa; background: #1e293b; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex overflow-x-auto scrollbar-hide">
            <button onclick="switchPage('home')" class="nav-btn px-6 py-4 font-bold whitespace-nowrap transition nav-active" id="btn-home">🏠 总览录入</button>
            <button onclick="switchPage('details')" class="nav-btn px-6 py-4 font-bold whitespace-nowrap transition" id="btn-details">📜 每日明细</button>
            <button onclick="switchPage('income')" class="nav-btn px-6 py-4 font-bold whitespace-nowrap transition" id="btn-income">📅 月度收入</button>
            <button onclick="switchPage('heroes')" class="nav-btn px-6 py-4 font-bold whitespace-nowrap transition" id="btn-heroes">⚔️ 英雄池分析</button>
            <button onclick="switchPage('settings')" class="nav-btn px-6 py-4 font-bold whitespace-nowrap transition" id="btn-settings">⚙️ 数据管理</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="page-home" class="page active space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                    <h2 class="text-xl font-bold mb-4 text-blue-400">✚ 新增记录</h2>
                    <div class="space-y-4">
                        <input id="dateInp" type="date" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 outline-none focus:border-blue-500 transition">
                        <input id="heroInp" type="text" placeholder="英雄 (选填, 不填显示'212')" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 outline-none focus:border-blue-500 transition">
                        <input id="amountInp" type="number" step="0.01" placeholder="红包金额(必填)" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 outline-none focus:border-blue-500 transition">
                        <button onclick="saveRecord()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-lg transition transform active:scale-95">保存对局</button>
                    </div>
                </div>
                <div class="lg:col-span-8 space-y-6">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                            <p class="text-xs text-slate-500 uppercase">当前总余额</p>
                            <p class="text-xl font-mono font-bold text-green-400" id="totalBalance">¥ 0.00</p>
                        </div>
                        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                            <p class="text-xs text-slate-500 uppercase">总局数</p>
                            <p class="text-xl font-bold text-blue-400" id="statTotalCount">0</p>
                        </div>
                        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                            <p class="text-xs text-slate-500 uppercase">本月盈亏</p>
                            <p class="text-xl font-mono font-bold" id="statMonthProfit">¥ 0.00</p>
                        </div>
                        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                            <p class="text-xs text-slate-500 uppercase">总胜率</p>
                            <p class="text-xl font-bold text-yellow-400" id="statCoreHero">0</p>
                        </div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 h-[300px] relative">
                        <div id="homeTrendChart" class="w-full h-full"></div>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <h3 class="font-bold text-blue-400 mb-4">🔥 核心英雄池</h3>
                    <div id="coreHeroes" class="space-y-2"></div>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <h3 class="font-bold text-red-400 mb-4">⚠️ 避坑英雄池</h3>
                    <div id="trashHeroes" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <div id="page-details" class="page space-y-4">
            <div class="flex flex-wrap gap-4 items-center bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <select id="filterDateSelect" onchange="renderDetails()" class="bg-slate-900 p-3 rounded-lg border border-slate-600 outline-none min-w-[150px] cursor-pointer"></select>
                <button onclick="toggleNegativeFilter()" id="btnNegativeFilter" class="bg-slate-700 text-slate-300 px-4 py-3 rounded-lg transition font-bold">📉 只看发包日</button>
            </div>
            <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden"><table class="w-full text-left border-collapse"><tbody id="detailTable"></tbody></table></div>
        </div>

        <div id="page-income" class="page space-y-6">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">📅 月度每日收入流水</h2>
                    <select id="incomeMonthSelect" onchange="renderIncomePage()" class="bg-slate-900 p-3 rounded-lg border border-slate-600 outline-none font-bold cursor-pointer"></select>
                </div>
				<div class="flex flex-wrap gap-4 mb-6">
                            <p class="text-xl font-mono font-bold text-green-400" id="monthTotalBalance">¥ 0.00</p>
                            <div class="absolute hidden group-hover:block -top-8 left-1/2 -translate-x-1/2 bg-slate-700 text-xs px-2 py-1 rounded whitespace-nowrap">本月总收入</div>
				</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div id="incomeBarChart" class="h-[400px]"></div><div class="overflow-y-auto max-h-[400px] space-y-2 pr-2" id="dailySummaryList"></div></div>
            </div>
        </div>

        <div id="page-heroes" class="page space-y-6">
             <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <div class="flex flex-wrap gap-4 mb-6">
                    <button onclick="renderHeroAnalysis('count')" class="bg-slate-700 px-4 py-2 rounded-lg hover:bg-blue-600 transition font-bold focus:bg-blue-600">按总场次排序</button>
                    <button onclick="renderHeroAnalysis('winrate')" class="bg-slate-700 px-4 py-2 rounded-lg hover:bg-emerald-600 transition font-bold focus:bg-emerald-600">按高胜率排序</button>
                    <button onclick="renderHeroAnalysis('profit')" class="bg-slate-700 px-4 py-2 rounded-lg hover:bg-yellow-600 transition font-bold focus:bg-yellow-600">按总收益排序</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-slate-700/50 text-slate-400 text-sm">
                            <tr><th class="p-4">英雄</th><th class="p-4">总场次</th><th class="p-4">胜/负</th><th class="p-4">胜率</th><th class="p-4">累计打出红包</th></tr>
                        </thead>
                        <tbody id="heroTableBody" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-settings" class="page space-y-6">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4 text-purple-400">💰 初始金额设置</h2>
                <div class="flex gap-4">
                    <input id="baseAmountInp" type="number" step="0.01" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-3 outline-none focus:border-purple-500 transition font-mono font-bold">
                    <button onclick="saveBaseAmount()" class="bg-purple-600 hover:bg-purple-500 px-8 py-3 rounded-xl font-bold transition whitespace-nowrap">保存设置</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <h2 class="text-xl font-bold mb-4 text-emerald-400">📤 导出备份</h2>
                    <button onclick="exportData()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition">导出 .json 文件</button>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <h2 class="text-xl font-bold mb-4 text-blue-400">📥 导入数据</h2>
                    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importJSON(this)">
                    <button onclick="document.getElementById('importFile').click()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">选择文件并导入</button>
                </div>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4 text-yellow-400">🛠️ 批量同步历史 (从 Markdown)</h2>
                <textarea id="mdInput" rows="6" placeholder="即使没写英雄名也能识别，例如：&#10;### 2026-04-28&#10;1. 5.72&#10;2. -6.00 劫" class="w-full bg-slate-900 border border-slate-600 rounded-xl p-4 font-mono text-sm outline-none focus:border-yellow-500 transition mb-4"></textarea>
                <button onclick="parseMarkdownImport()" class="w-full bg-yellow-600 hover:bg-yellow-500 py-3 rounded-xl font-bold transition">识别并合并到现有数据</button>
            </div>
            <div class="bg-red-900/10 p-6 rounded-2xl border border-red-900/50">
                <h2 class="text-xl font-bold mb-4 text-red-500">🧨 危险区域 (清空数据)</h2>
                <button onclick="clearAllData()" class="w-full bg-red-800/80 hover:bg-red-600 text-white py-3 rounded-xl font-bold transition border border-red-700">⚠️ 彻底清空所有战绩记录</button>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-lg rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
            <div class="bg-slate-700/50 p-4 border-b border-slate-700 flex justify-between items-center">
                <h3 id="modalTitle" class="font-bold text-lg text-blue-400"></h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl font-bold px-2">✕</button>
            </div>
            <div id="modalContent" class="p-4 max-h-[60vh] overflow-y-auto space-y-1"></div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('lol_data_v2') || '[]');
        let baseAmount = parseFloat(localStorage.getItem('lol_base_amount')) || 2330.14;
        let isNegativeFilter = false;

        // 【修改】录入逻辑：如果没填英雄，自动设为“212”
        function saveRecord() {
            const date = document.getElementById('dateInp').value;
            let hero = document.getElementById('heroInp').value.trim();
            const amount = parseFloat(document.getElementById('amountInp').value);
            
            if(!date || isNaN(amount)) return alert("日期和金额是必填的！");
            if(!hero) hero = "212"; // 自动补齐

            records.push({ id: Date.now(), date, hero, amount });
            saveAndRefresh();
            document.getElementById('heroInp').value = '';
            document.getElementById('amountInp').value = '';
        }

        // 【修改】Markdown 解析逻辑：适应无英雄名的情况
        function parseMarkdownImport() {
            const text = document.getElementById('mdInput').value;
            const lines = text.split('\n');
            let currentDate = ''; let count = 0;

            lines.forEach(line => {
                const dateMatch = line.match(/(\d{4}-\d{2}-\d{2})/);
                if (dateMatch) currentDate = dateMatch[1];
                
                // 增强版正则：匹配 "1. 5.72 英雄" 或 "1. 5.72"
                // 匹配模式：数字序号 + 点 + 空格 + 金额 + (可选的空格+英雄名)
                const detailMatch = line.match(/^\d+\.\s+(-?\d+\.?\d*)\s*(.*)/);
                if (detailMatch && currentDate) {
                    const amount = parseFloat(detailMatch[1]);
                    let hero = detailMatch[2] ? detailMatch[2].trim() : "212";
                    
                    // 如果识别出来的 hero 字符串里还带有统计等杂质，这里可以进一步过滤，目前暂定只要后面有字就认为是英雄名
                    if (!records.some(r => r.date === currentDate && r.hero === hero && r.amount === amount)) {
                        records.push({ id: Date.now() + Math.random(), date: currentDate, hero, amount });
                        count++;
                    }
                }
            });

            if (count > 0) {
                saveAndRefresh();
                alert(`成功识别并导入 ${count} 条记录！`);
                document.getElementById('mdInput').value = '';
            } else alert("未识别到新记录，请检查格式。");
        }

        // 刷新和保存逻辑 (同 v3.2)
        function saveAndRefresh() {
            records.sort((a,b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('lol_data_v2', JSON.stringify(records));
            refreshCurrentPage();
        }

        // 渲染明细：针对“212”英雄做特殊颜色处理
        function showDayDetail(date) {
            const dayRecords = records.filter(r => r.date === date);
            const total = dayRecords.reduce((s, r)=> s+r.amount, 0);
            openModal(`🗓️ ${date} 明细`, 
            dayRecords.map(r => `
                <div class="flex justify-between items-center py-3 border-b border-slate-700/50 px-2 hover:bg-slate-700/30 rounded">
                    <span class="${r.hero === '212' ? 'text-slate-500 italic' : 'font-bold'} text-lg">${r.hero}</span>
                    <span class="font-mono font-bold text-lg ${r.amount >=0 ? 'text-green-400' : 'text-red-400'}">${r.amount > 0 ? '+' : ''}${r.amount.toFixed(2)}</span>
                </div>
            `).join(''));
        }
		
		function showHeroDetail(heroName) {
            const heroRecords = records.filter(r => r.hero === heroName).reverse();
            openModal(`⚔️ 【${heroName}】历史表现`, heroRecords.map(r => `
                <div class="flex justify-between items-center py-3 border-b border-slate-700/50 px-2 hover:bg-slate-700/30 rounded">
                    <span class="text-slate-400 text-sm">${r.date}</span>
                    <span class="font-mono font-bold text-lg ${r.amount >=0 ? 'text-green-400' : 'text-red-400'}">${r.amount > 0 ? '+' : ''}${r.amount.toFixed(2)}</span>
                </div>
            `).join(''));
        }

        // 下面是通用的图表和 UI 切换函数（逻辑同前版本）
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('nav-active');
            refreshCurrentPage();
        }

        function refreshCurrentPage() {
            initSelects();
            const activePage = document.querySelector('.page.active').id;
            if(activePage === 'page-home') renderHomePage();
            if(activePage === 'page-details') renderDetails();
            if(activePage === 'page-income') renderIncomePage();
            if(activePage === 'page-heroes') renderHeroAnalysis();
        }

        function initSelects() {
            const dateSet = new Set(); const monthSet = new Set();
            records.forEach(r => { dateSet.add(r.date); monthSet.add(r.date.substring(0,7)); });
            const ds = document.getElementById('filterDateSelect');
            ds.innerHTML = '<option value="">所有日期</option>' + [...dateSet].sort().reverse().map(d => `<option value="${d}">${d}</option>`).join('');
            const ms = document.getElementById('incomeMonthSelect');
            const months = [...monthSet].sort().reverse();
            if(months.length === 0) months.push(new Date().toISOString().substring(0,7));
            ms.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        function renderHomePage() {
            const totalProfit = records.reduce((s, r) => s + r.amount, 0);
            document.getElementById('totalBalance').innerText = `¥ ${(baseAmount + totalProfit).toFixed(2)}`;
            document.getElementById('statTotalCount').innerText = records.length;
            const currentMonthStr = new Date().toISOString().substring(0,7);
            const mProfit = records.filter(r => r.date.startsWith(currentMonthStr)).reduce((s, r) => s + r.amount, 0);
            const pEl = document.getElementById('statMonthProfit');
            pEl.innerText = `${mProfit > 0 ? '+' : ''}${mProfit.toFixed(2)}`;
            pEl.className = `text-xl font-mono font-bold ${mProfit >= 0 ? 'text-green-400' : 'text-red-400'}`;

            const winCount = records.filter(r => r.amount >= 0).length;
            const totalWinRate = (winCount / mProfit) * 100;

            const stats = getHeroStats();
            const hs = Object.values(stats);
            document.getElementById('statCoreHero').innerText = `${totalWinRate ? totalWinRate : 0}%`;
            document.getElementById('coreHeroes').innerHTML = hs.filter(h => h.name != "212" && h.winRate >= 70 && h.count >= 2).sort((a,b)=>b.count-a.count).slice(0,5).map(h=>`<div class="flex justify-between bg-slate-900/50 p-3 rounded-lg text-sm border-l-4 border-blue-500"><span>${h.name}</span><span class="text-blue-400 font-bold">${h.winRate}%</span></div>`).join('');
            document.getElementById('trashHeroes').innerHTML = hs.filter(h => h.winRate < 50 && h.count >= 1).sort((a,b)=>a.winRate-b.winRate).slice(0,5).map(h=>`<div class="flex justify-between bg-slate-900/50 p-3 rounded-lg text-sm border-l-4 border-red-500"><span>${h.name}</span><span class="text-red-400 font-bold">${h.winRate}%</span></div>`).join('');
            renderHomeChart();
        }

        function getHeroStats() {
            const s = {};
            records.forEach(r => {
                if(!s[r.hero]) s[r.hero] = { name: r.hero, count: 0, wins: 0, profit: 0 };
                s[r.hero].count++; s[r.hero].profit += r.amount;
                if(r.amount > 0) s[r.hero].wins++;
            });
            Object.values(s).forEach(h => h.winRate = Math.round((h.wins/h.count)*100));
            return s;
        }

        function renderHomeChart() {
            const chart = echarts.init(document.getElementById('homeTrendChart'), 'dark');
            const dailyMap = {};
            records.forEach(r => { dailyMap[r.date] = (dailyMap[r.date] || 0) + r.amount; });
            const sortedDates = Object.keys(dailyMap).sort().slice(-30);
            chart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: sortedDates, axisLabel: { formatter: v => v.substring(5) } },
                yAxis: { type: 'value' },
                series: [{ data: sortedDates.map(d => dailyMap[d].toFixed(2)), type: 'line', smooth: true, areaStyle: { opacity: 0.1 }, itemStyle: { color: '#10b981' } }]
            });
        }

        function renderDetails() {
            const dateFilter = document.getElementById('filterDateSelect').value;
            const dayMap = {};
            records.forEach(r => {
                if(!dayMap[r.date]) dayMap[r.date] = { date: r.date, amount: 0, count: 0 };
                dayMap[r.date].amount += r.amount; dayMap[r.date].count++;
            });
            let days = Object.values(dayMap).sort((a,b) => new Date(b.date) - new Date(a.date));
            if(dateFilter) days = days.filter(d => d.date === dateFilter);
            if(isNegativeFilter) days = days.filter(d => d.amount < 0);
            document.getElementById('detailTable').innerHTML = days.map(d => `
                <tr onclick="showDayDetail('${d.date}')" class="border-b border-slate-700/50 hover:bg-slate-700/50 transition cursor-pointer group">
                    <td class="p-4 font-bold">${d.date}</td>
                    <td class="p-4 text-slate-400">${d.count} 局</td>
                    <td class="p-4 font-mono font-bold ${d.amount >= 0 ? 'text-green-400' : 'text-red-400'}">¥ ${d.amount.toFixed(2)}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs ${d.amount >= 0 ? 'bg-green-900 text-green-400' : 'bg-red-900 text-red-400'}">${d.amount >= 0 ? 'Win' : 'Loss'}</span></td>
                </tr>
            `).join('');
			
        }

        function renderIncomePage() {
            const m = document.getElementById('incomeMonthSelect').value;
            const dailyMap = {};
            records.filter(r => r.date.startsWith(m)).forEach(r => { dailyMap[r.date] = (dailyMap[r.date] || 0) + r.amount; });
            const sortedDates = Object.keys(dailyMap).sort();
            const chart = echarts.init(document.getElementById('incomeBarChart'), 'dark');
            chart.setOption({
                backgroundColor: 'transparent',
                xAxis: { type: 'category', data: sortedDates.map(d => d.split('-')[2]) },
                yAxis: { type: 'value' },
                series: [{ data: sortedDates.map(d => dailyMap[d].toFixed(2)), type: 'bar', itemStyle: { color: p => p.value >= 0 ? '#10b981' : '#ef4444' } }]
            });
            document.getElementById('dailySummaryList').innerHTML = sortedDates.reverse().map(d => `<div onclick="showDayDetail('${d}')" class="flex justify-between p-4 bg-slate-700/30 rounded-xl cursor-pointer"><span>${d}</span><span class="${dailyMap[d]>=0?'text-green-400':'text-red-400'} font-bold">¥ ${dailyMap[d].toFixed(2)}</span></div>`).join('');
			// 本月盈亏
            const thisMonthProfit = records.filter(r => r.date.startsWith(m)).reduce((s, r) => s + r.amount, 0);
            const monthTotalBalance = document.getElementById('monthTotalBalance');
            monthTotalBalance.innerText = `${thisMonthProfit > 0 ? '+' : ''}${thisMonthProfit.toFixed(2)}`;
		}

        function renderHeroAnalysis(sortBy = 'count') {
            const stats = Object.values(getHeroStats());
            if(sortBy === 'count') stats.sort((a,b) => b.count - a.count);
            if(sortBy === 'winrate') stats.sort((a,b) => b.winRate - a.winRate);
            if(sortBy === 'profit') stats.sort((a,b) => b.profit - a.profit);
            document.getElementById('heroTableBody').innerHTML = stats.map(h => `
                <tr  onclick="showHeroDetail('${h.name}')" class="border-b border-slate-700/50 hover:bg-slate-700/50 transition cursor-pointer group">
                    <td class="p-4 font-bold ${h.name === '212' ? 'text-slate-500 italic' : ''}">${h.name}</td>
                    <td class="p-4">${h.count}</td>
                    <td class="p-4">${h.wins}胜/${h.count-h.wins}负</td>
                    <td class="p-4">${h.winRate}%</td>
                    <td class="p-4 ${h.profit>=0?'text-green-400':'text-red-400'}">${h.profit.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        function saveBaseAmount() {
            baseAmount = parseFloat(document.getElementById('baseAmountInp').value) || 0;
            localStorage.setItem('lol_base_amount', baseAmount);
            alert("初始金额已更新");
            refreshCurrentPage();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records, null, 2)], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `lol_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importJSON(input) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(Array.isArray(data)) { records = data; saveAndRefresh(); alert("导入成功"); }
                } catch(e) { alert("格式错误"); }
            };
            reader.readAsText(input.files[0]);
        }

        function clearAllData() {
            if(confirm("确定清空吗？不可恢复！")) { records = []; saveAndRefresh(); }
        }

        function toggleNegativeFilter() { isNegativeFilter = !isNegativeFilter; renderDetails(); }
        function openModal(t, c) { document.getElementById('modalTitle').innerHTML = t; document.getElementById('modalContent').innerHTML = c; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        window.onload = () => {
            document.getElementById('dateInp').valueAsDate = new Date();
            document.getElementById('baseAmountInp').value = baseAmount;
            initSelects();
            renderHomePage();
        };
    </script>
</body>
</html>
